<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NMS Dev Control</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2e2e2e;
    --text: #e0e0e0;
    --dim: #666;
    --ok: #4caf7d;
    --err: #e05555;
    --accent: #e8d84b;
    --font: 'IBM Plex Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding: 0;
  }

  /* ── header ── */
  header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-shrink: 0;
  }

  header .title {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  header .subtitle {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.05em;
  }

  /* ── log ── */
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    -webkit-overflow-scrolling: touch;
  }

  .log-cmd {
    color: var(--dim);
    font-size: 0.8rem;
    padding-top: 8px;
  }

  .log-cmd::before {
    content: '› ';
    color: var(--accent);
  }

  .log-result {
    font-size: 0.8rem;
    padding-left: 12px;
  }

  .log-result.ok  { color: var(--ok); }
  .log-result.err { color: var(--err); }

  .log-empty {
    color: var(--dim);
    font-size: 0.75rem;
    margin: auto;
    text-align: center;
    line-height: 2;
  }

  /* ── input area ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    flex-shrink: 0;
    background: var(--surface);
  }

  .input-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 8px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }

  #cmd {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 1rem;
    padding: 10px 12px;
    outline: none;
    border-radius: 3px;
    -webkit-appearance: none;
    appearance: none;
  }

  #cmd:focus {
    border-color: var(--accent);
  }

  #submit {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    font-family: var(--font);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 16px;
    border-radius: 3px;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  #submit:active {
    opacity: 0.75;
  }
</style>
</head>
<body>

<header>
  <span class="title">NMS Control</span>
  <span class="subtitle">dev mode</span>
</header>

<div id="log">
  <div class="log-empty" id="empty-msg">no commands sent yet</div>
</div>

<footer>
  <div class="input-label">Command</div>
  <div class="input-row">
    <input id="cmd" type="text" autocomplete="off" autocorrect="off"
           autocapitalize="off" spellcheck="false" placeholder="e.g. jet" autofocus />
    <button id="submit">Send</button>
  </div>
</footer>

<script>
const input  = document.getElementById('cmd');
const log    = document.getElementById('log');
const submit = document.getElementById('submit');
const empty  = document.getElementById('empty-msg');

async function sendCommand() {
  const raw = input.value.trim();
  input.value = '';
  if (!raw) return;

  if (empty) empty.remove();

  const cmdEl = document.createElement('div');
  cmdEl.className = 'log-cmd';
  cmdEl.textContent = raw;
  log.appendChild(cmdEl);

  const resultEl = document.createElement('div');
  resultEl.className = 'log-result';

  try {
    const res  = await fetch('/cmd/' + encodeURIComponent(raw));
    const data = await res.json();
    if (data.ok) {
      resultEl.classList.add('ok');
      resultEl.textContent = 'OK';
    } else {
      resultEl.classList.add('err');
      resultEl.textContent = data.error || 'ERROR';
    }
  } catch(e) {
    resultEl.classList.add('err');
    resultEl.textContent = 'network error';
  }

  log.appendChild(resultEl);
  log.scrollTop = log.scrollHeight;
  input.focus();
}

submit.addEventListener('click', sendCommand);
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendCommand(); });
</script>
</body>
</html>
